<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarun Asthana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e141d;
      --text: #f5f5f5;
      --muted: #8a93a3;
      --orange: #F6821F;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .hero img {
      width: 100%;
      max-width: 1200px;
      height: auto;
      display: block;
    }

    .site-footer {
      flex-shrink: 0;
      padding: 1.5rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .site-footer a {
      transition: color 0.2s ease;
    }

    .site-footer a:hover {
      color: var(--orange);
    }

    @media (max-width: 640px) {
      .site-footer {
        flex-direction: column;
        gap: 0.6rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <img src="assets/home.svg" alt="Tarun Asthana" />
  </main>

  <footer class="site-footer">
    <span>Tarun Asthana</span>
    <a href="mailto:asthana290@gmail.com">asthana290@gmail.com</a>
  </footer>
</body>
</html>
