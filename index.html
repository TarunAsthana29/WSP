<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarun Asthana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #fff;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Radial ambient glows */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 70% at 18% 60%, rgba(246,130,31,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 40% 50% at 72% 38%, rgba(255,255,255,0.05) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    a { color: inherit; text-decoration: none; }

    /* ── HERO WRAPPER ── */
    .hero {
      flex: 1;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
      padding: 0 5vw;
    }

    /* ── WELCOME LINE ── */
    .welcome {
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: clamp(0.65rem, 1.1vw, 1rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      margin-bottom: 0.1em;
      position: relative;
      z-index: 3;
    }

    /* ── BIG NAME HEADLINE ── */
    .headline-wrap {
      position: relative;
      line-height: 0.85;
      pointer-events: none;
      user-select: none;
    }

    .headline {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: clamp(5rem, 17vw, 19rem);
      letter-spacing: -0.01em;
      display: flex;
      align-items: baseline;
      gap: 0.18em;
    }

    .hl-im   { color: #F6821F; }
    .hl-name { color: #F5DEC4; }

    /* ── AVATAR ── */
    .avatar {
      position: absolute;
      bottom: -4%;
      left: 28%;
      width: clamp(220px, 30vw, 500px);
      transform: translateX(-50%);
      z-index: 5;
      pointer-events: none;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,0.6));
    }

    /* ── RIGHT CONTENT ── */
    .right-content {
      position: absolute;
      right: 5vw;
      bottom: 14%;
      width: clamp(260px, 36vw, 520px);
      z-index: 4;
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
      text-align: right;
    }

    .bio {
      font-size: clamp(0.9rem, 1.3vw, 1.2rem);
      line-height: 1.65;
      color: rgba(255,255,255,0.88);
    }

    .bio .accent { color: #F6821F; }

    .cta-group {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .cta-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }

    .cta-sub {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      color: rgba(255,255,255,0.45);
    }

    .btn {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: clamp(0.7rem, 1vw, 0.9rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.7em 1.5em;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      border: 2px solid transparent;
      transition: transform 0.15s, filter 0.15s;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-2px); filter: brightness(1.12); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: #F6821F;
      color: #fff;
      border-color: #F6821F;
    }

    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.35);
    }

    /* ── TAGLINE BOTTOM-LEFT ── */
    .tagline {
      position: absolute;
      bottom: 3.5vh;
      left: 5vw;
      font-style: italic;
      font-size: clamp(0.7rem, 1vw, 0.88rem);
      color: rgba(255,255,255,0.4);
      z-index: 4;
      letter-spacing: 0.01em;
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      html, body { overflow: auto; height: auto; }

      .hero {
        min-height: 100svh;
        padding: 2rem 5vw 5rem;
        justify-content: flex-start;
        padding-top: 3rem;
      }

      .headline {
        font-size: clamp(4rem, 22vw, 7rem);
      }

      .avatar {
        position: relative;
        bottom: auto;
        left: auto;
        transform: none;
        width: clamp(180px, 55vw, 300px);
        display: block;
        margin: -1rem auto -2rem;
      }

      .right-content {
        position: relative;
        right: auto;
        bottom: auto;
        width: 100%;
        text-align: center;
        margin-top: 1.5rem;
      }

      .cta-group { justify-content: center; }

      .tagline {
        position: relative;
        bottom: auto;
        left: auto;
        margin-top: 2rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <p class="welcome">Hey, Welcome !</p>

    <div class="headline-wrap">
      <div class="headline">
        <span class="hl-im">I'M</span>
        <span class="hl-name">TARUN</span>
      </div>

      <img
        class="avatar"
        src="assets/Tarun Asthana (1).png"
        alt="Tarun Asthana"
      />
    </div>

    <div class="right-content">
      <p class="bio">
        I started with a <span class="accent">paintbrush</span>, found my way to <span class="accent">marketing.</span><br>
        I work at the intersection of how things look,<br>
        what they mean, and why people care.
      </p>
      <div class="cta-group">
        <div class="cta-wrap">
          <a href="#work" class="btn btn-primary">GO TO MARS &nbsp;→</a>
          <span class="cta-sub">my work</span>
        </div>
        <div class="cta-wrap">
          <a href="#about" class="btn btn-secondary">GO TO MOON &nbsp;→</a>
          <span class="cta-sub">about me</span>
        </div>
      </div>
    </div>

    <p class="tagline">Built Slow. Built Real.</p>
  </main>
</body>
</html>
