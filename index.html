<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarun Asthana</title>
  <style>
    @font-face {
      font-family: 'Garet';
      src: url('assets/Garet-Font/Garet Heavy.ttf') format('truetype');
      font-weight: 900;
    }
    @font-face {
      font-family: 'Garet';
      src: url('assets/Garet-Font/Garet Bold.ttf') format('truetype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'Garet';
      src: url('assets/Garet-Font/Garet Medium.ttf') format('truetype');
      font-weight: 500;
    }
    @font-face {
      font-family: 'Garet';
      src: url('assets/Garet-Font/Garet Book.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Garet';
      src: url('assets/Garet-Font/Garet Light.ttf') format('truetype');
      font-weight: 300;
    }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: 'Garet', sans-serif;
      font-weight: 700;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 4vh;
      gap: 0.1em;
      z-index: 1;
    }

    .welcome {
      font-size: 1.4vw;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
    }

    .main-title {
      font-size: 15vw; /* overridden by fitTitle() JS */
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.01em;
      white-space: nowrap;
      padding: 0 3vw;
      margin-top: -0.05em;
      background: linear-gradient(to right, #FF8329 0%, #F5A070 28%, #FAD4B2 62%, #FFF0E6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Light source 1 — upper left, angled beam */
    .light-left {
      position: fixed;
      top: -10%;
      left: -12%;
      width: 55vw;
      height: 70vh;
      background: radial-gradient(ellipse at 15% 30%, #e8a882 0%, #b06040 20%, transparent 65%);
      opacity: 0.65;
      pointer-events: none;
      border-radius: 50%;
      transform: rotate(-20deg);
      animation: glow-left 6s ease-in-out infinite;
      filter: blur(18px);
    }

    /* Light source 2 — lower right, rounder glow */
    .light-right {
      position: fixed;
      bottom: -15%;
      right: -8%;
      width: 45vw;
      height: 55vh;
      background: radial-gradient(ellipse at 60% 70%, #e8a882 0%, #b06040 22%, transparent 65%);
      opacity: 0.65;
      pointer-events: none;
      border-radius: 50%;
      animation: glow-right 7s ease-in-out infinite;
      filter: blur(22px);
    }

    .bio {
      position: absolute;
      right: 3vw;
      top: 38%;
      text-align: right;
      max-width: 44vw;
    }

    .bio-line1 {
      font-size: 1.2vw;
      font-weight: 400;
      color: #fff;
      line-height: 1.5;
    }

    .bio-line2 {
      font-size: 1.05vw;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.6;
      margin-top: 0.3em;
    }

    .accent {
      color: #FF8329;
      font-weight: 400;
    }

    .btn-group {
      position: fixed;
      bottom: 8vh;
      right: 3vw;
      display: flex;
      gap: calc(1rem + 20px);
      align-items: center;
      z-index: 10;
    }

    .btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 11vw;
      height: 2.6vw;
      padding: 0;
      border-radius: 0.8vw;
      font-family: 'Garet', sans-serif;
      font-weight: 700;
      font-size: 0.95vw;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
      box-sizing: border-box;
      transition: transform 0.18s, filter 0.18s;
    }

    .btn:hover  { transform: translateY(-2px); filter: brightness(1.1); }
    .btn:active { transform: translateY(0); }

    .btn-orange {
      background: #FF8329;
      color: #fff;
      box-shadow: 0 4px 18px rgba(255,131,41,0.35);
      outline: 0.25vw solid #B85000;
      outline-offset: 0.15vw;
    }

    .btn-grey {
      background: rgba(210,210,210,0.15);
      color: #ccc;
      border: 1.5px solid rgba(200,200,200,0.35);
      outline: 0.25vw solid rgba(200,200,200,0.45);
      outline-offset: 0.15vw;
    }

    .btn-label {
      font-size: 1vw;
      font-style: italic;
      font-weight: 400;
      margin-top: 10px;
    }

    .orange-label { color: #FFa050; }
    .grey-label   { color: rgba(255,255,255,0.9); }

    .avatar {
      position: absolute;
      top: 23vh;
      left: 38%;
      transform: translateX(-50%);
      width: 22vw;
      height: auto;
      z-index: 4;
      pointer-events: none;
      filter: drop-shadow(0 20px 50px rgba(0,0,0,0.7));
      animation: avatar-float 4s ease-in-out infinite;
      opacity: 1;
    }

    @keyframes avatar-float {
      0%   { transform: translateX(-50%) translateY(0px);    opacity: 1; }
      50%  { transform: translateX(-50%) translateY(-14px);  opacity: 1; }
      100% { transform: translateX(-50%) translateY(0px);    opacity: 1; }
    }

    @keyframes avatar-enter {
      from { opacity: 0; transform: translateX(-50%) translateY(30px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0px);  }
    }

    .tagline {
      position: fixed;
      bottom: calc(4vh + 20px);
      left: 4vw;
      font-size: 1.1vw;
      font-weight: 400;
      font-style: italic;
      color: #ffffff;
      letter-spacing: 0.02em;
      z-index: 10;
    }

    @keyframes glow-left {
      0%, 100% { opacity: 0.65; transform: rotate(-20deg) scale(1);   }
      50%       { opacity: 0.45; transform: rotate(-20deg) scale(1.08); }
    }

    @keyframes glow-right {
      0%, 100% { opacity: 0.65; transform: scale(1);    }
      50%       { opacity: 0.45; transform: scale(1.1); }
    }
  </style>
</head>
<body>

  <div class="light-left"></div>
  <div class="light-right"></div>

  <div class="hero">
    <p class="welcome" id="welcome-text">Hey, Welcome !</p>
    <h1 class="main-title">I'M TARUN</h1>
    <img class="avatar" src="assets/Untitled design.png" alt="Tarun Asthana" />

    <div class="bio">
      <p class="bio-line1">I started with a <span class="accent">paintbrush</span>, found my way to <span class="accent">marketing.</span></p>
      <p class="bio-line2">I work at the intersection of how things look,<br>what they mean, and why people care.</p>
    </div>
  </div>

  <div class="btn-group">
    <div class="btn-wrap">
      <a href="mars.html" class="btn btn-orange">GO TO MARS &nbsp;→</a>
      <span class="btn-label orange-label">my work</span>
    </div>
    <div class="btn-wrap">
      <a href="#" class="btn btn-grey">GO TO MOON &nbsp;→</a>
      <span class="btn-label grey-label">about me</span>
    </div>
  </div>

  <p class="tagline">Built Slow. Built Real.</p>

  <canvas id="dot-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></canvas>

  <script>
    (function () {
      const canvas = document.getElementById('dot-canvas');
      const ctx    = canvas.getContext('2d');
      const SPACING = 28;
      const DOT_R   = 1.5;

      let mx = window.innerWidth / 2, my = window.innerHeight / 2;
      let avOffX = 0, avOffY = 0;

      // Sync with the avatar parallax offsets calculated in the main script
      window.addEventListener('mousemove', (e) => {
        mx = e.clientX; my = e.clientY;
        const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
        avOffX = ((e.clientX - cx) / cx) * 12;
        avOffY = ((e.clientY - cy) / cy) * 8;
      });

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      // Gravitational pull: displaces dot toward source, falls off with distance
      function warp(dotX, dotY, srcX, srcY, strength, radius) {
        const dx = dotX - srcX, dy = dotY - srcY;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const pull = strength / (1 + Math.pow(dist / radius, 1.5));
        return { x: -(dx / dist) * pull, y: -(dy / dist) * pull };
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const W = canvas.width, H = canvas.height;

        // Avatar gravitational center (matches CSS position + parallax offset)
        const avX = W * 0.38 + avOffX;
        const avY = H * 0.42 + avOffY;

        for (let gx = SPACING / 2; gx < W; gx += SPACING) {
          for (let gy = SPACING / 2; gy < H; gy += SPACING) {
            const a = warp(gx, gy, avX, avY, 32, 170); // avatar gravity
            const c = warp(gx, gy, mx,  my,  10, 85);  // cursor gravity

            const fx = gx + a.x + c.x;
            const fy = gy + a.y + c.y;

            // Dots very close to avatar center fade out (swallowed by the well)
            const dToAv   = Math.hypot(fx - avX, fy - avY);
            const fadeEdge = Math.min(1, dToAv / 55);

            ctx.globalAlpha = 0.38 * fadeEdge;
            ctx.fillStyle   = '#ffffff';
            ctx.beginPath();
            ctx.arc(fx, fy, DOT_R, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        requestAnimationFrame(draw);
      }

      requestAnimationFrame(draw);
    })();
  </script>

<style>
    .welcome .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .welcome .letter.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>

  <script>
    const el = document.getElementById('welcome-text');
    const text = el.innerText;
    const delay = 70; // ms per letter

    el.innerHTML = text.split('').map((ch) =>
      `<span class="letter">${ch === ' ' ? '&nbsp;' : ch}</span>`
    ).join('');

    const letters = el.querySelectorAll('.letter');

    function animateIn() {
      letters.forEach((l, i) =>
        setTimeout(() => l.classList.add('visible'), i * delay)
      );
    }

    function animateOut() {
      letters.forEach((l, i) =>
        setTimeout(() => l.classList.remove('visible'), i * delay)
      );
    }

    function cycle() {
      animateIn();
      const inDone = letters.length * delay + 1200;
      setTimeout(() => {
        animateOut();
        const outDone = letters.length * delay + 600;
        setTimeout(cycle, outDone);
      }, inDone);
    }

    cycle();

    // Fit headline to viewport — only touches font-size, nothing else
    const title = document.querySelector('.main-title');
    function fitTitle() {
      title.style.fontSize = '10px';
      const maxW = window.innerWidth * 0.94; // 3vw padding each side = 6% total
      let lo = 10, hi = 500, mid;
      while (lo < hi - 1) {
        mid = Math.floor((lo + hi) / 2);
        title.style.fontSize = mid + 'px';
        title.scrollWidth <= maxW ? lo = mid : hi = mid;
      }
      title.style.fontSize = lo + 'px';
    }
    fitTitle();
    window.addEventListener('resize', fitTitle);

    // Avatar: float + mouse parallax
    const avatar = document.querySelector('.avatar');
    avatar.style.animation = 'avatar-float 4s ease-in-out infinite';

    // Mouse parallax
    let floatY = 0;
    document.addEventListener('mousemove', (e) => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx; // -1 to 1
      const dy = (e.clientY - cy) / cy;
      const px = dx * 12;
      const py = dy * 8;
      avatar.style.animation = 'none';
      avatar.style.transform = `translateX(calc(-50% + ${px}px)) translateY(${py}px)`;
    });

    document.addEventListener('mouseleave', () => {
      avatar.style.animation = 'avatar-float 4s ease-in-out infinite';
      avatar.style.transform = 'translateX(-50%)';
    });

  </script>
</body>
</html>
