<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarun Asthana</title>
  <style>
    @font-face {
      font-family: 'Garet';
      src: url('assets/garet/Garet-Heavy.woff2') format('woff2'),
           url('assets/garet/Garet-Heavy.woff')  format('woff');
      font-weight: 700 900;
      font-style: normal;
    }
    @font-face {
      font-family: 'Garet';
      src: url('assets/garet/Garet-Book.woff2') format('woff2'),
           url('assets/garet/Garet-Book.woff')  format('woff');
      font-weight: 400;
      font-style: normal;
    }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: 'Garet', sans-serif;
      font-weight: 700;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 4vh;
      gap: 0.1em;
      z-index: 1;
    }

    .welcome {
      font-size: clamp(0.85rem, 1.6vw, 1.4rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
    }

    .main-title {
      font-size: clamp(3rem, 15vw, 18rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.01em;
      white-space: nowrap;
      padding: 0 3vw;
      margin-top: -0.05em;
      background: linear-gradient(to right, #FF8329 0%, #F5A070 28%, #FAD4B2 62%, #FFF0E6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Light source 1 — upper left, angled beam */
    .light-left {
      position: fixed;
      top: -10%;
      left: -12%;
      width: 55vw;
      height: 70vh;
      background: radial-gradient(ellipse at 15% 30%, #c9907a 0%, #8b5a48 20%, transparent 65%);
      opacity: 0.5;
      pointer-events: none;
      border-radius: 50%;
      transform: rotate(-20deg);
      animation: glow-left 6s ease-in-out infinite;
      filter: blur(18px);
    }

    /* Light source 2 — lower right, rounder glow */
    .light-right {
      position: fixed;
      bottom: -15%;
      right: -8%;
      width: 45vw;
      height: 55vh;
      background: radial-gradient(ellipse at 60% 70%, #c9907a 0%, #8b5a48 22%, transparent 65%);
      opacity: 0.5;
      pointer-events: none;
      border-radius: 50%;
      animation: glow-right 7s ease-in-out infinite;
      filter: blur(22px);
    }

    .bio {
      position: absolute;
      right: 3vw;
      top: 38%;
      text-align: right;
      max-width: 44vw;
    }

    .bio-line1 {
      font-size: clamp(0.8rem, 1.3vw, 1.15rem);
      font-weight: 400;
      color: #fff;
      line-height: 1.5;
    }

    .bio-line2 {
      font-size: clamp(0.75rem, 1.15vw, 1rem);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.6;
      margin-top: 0.3em;
    }

    .accent {
      color: #FF8329;
      font-weight: 400;
    }

    .btn-group {
      position: fixed;
      bottom: 8vh;
      right: 3vw;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      z-index: 10;
    }

    .btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .btn {
      display: inline-block;
      padding: 0.7em 1.6em;
      border-radius: 50px;
      font-family: 'Garet', sans-serif;
      font-weight: 700;
      font-size: clamp(0.7rem, 1vw, 0.95rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
      transition: transform 0.18s, filter 0.18s;
    }

    .btn:hover  { transform: translateY(-2px); filter: brightness(1.1); }
    .btn:active { transform: translateY(0); }

    .btn-orange {
      background: #FF8329;
      color: #fff;
      box-shadow: 0 4px 18px rgba(255,131,41,0.35);
    }

    .btn-grey {
      background: rgba(210,210,210,0.15);
      color: #ccc;
      border: 1.5px solid rgba(200,200,200,0.35);
    }

    .btn-label {
      font-size: clamp(0.6rem, 0.85vw, 0.78rem);
      font-style: italic;
      font-weight: 400;
    }

    .orange-label { color: #FF8329; }
    .grey-label   { color: rgba(255,255,255,0.55); }

    .avatar {
      position: absolute;
      /* font is 15vw — face sits between M and T at ~38% from left */
      top: calc(8vh + 100px);
      left: 38%;
      transform: translateX(-50%);
      /* width tied to font size so it scales together */
      width: 22vw;
      height: auto;
      z-index: 4;
      pointer-events: none;
      filter: drop-shadow(0 20px 50px rgba(0,0,0,0.7));
    }

    .tagline {
      position: fixed;
      bottom: 4vh;
      left: 4vw;
      font-size: clamp(0.65rem, 1vw, 0.9rem);
      font-weight: 400;
      font-style: italic;
      color: #ffffff;
      letter-spacing: 0.02em;
      z-index: 10;
    }

    @keyframes glow-left {
      0%, 100% { opacity: 0.5; transform: rotate(-20deg) scale(1);   }
      50%       { opacity: 0.35; transform: rotate(-20deg) scale(1.08); }
    }

    @keyframes glow-right {
      0%, 100% { opacity: 0.5; transform: scale(1);    }
      50%       { opacity: 0.38; transform: scale(1.1); }
    }
  </style>
</head>
<body>

  <div class="light-left"></div>
  <div class="light-right"></div>

  <div class="hero">
    <p class="welcome" id="welcome-text">Hey, Welcome !</p>
    <h1 class="main-title">I'M TARUN</h1>
    <img class="avatar" src="assets/Untitled design.png" alt="Tarun Asthana" />

    <div class="bio">
      <p class="bio-line1">I started with a <span class="accent">paintbrush</span>, found my way to <span class="accent">marketing.</span></p>
      <p class="bio-line2">I work at the intersection of how things look,<br>what they mean, and why people care.</p>
    </div>
  </div>

  <div class="btn-group">
    <div class="btn-wrap">
      <a href="#" class="btn btn-orange">GO TO MARS &nbsp;→</a>
      <span class="btn-label orange-label">my work</span>
    </div>
    <div class="btn-wrap">
      <a href="#" class="btn btn-grey">GO TO MOON &nbsp;→</a>
      <span class="btn-label grey-label">about me</span>
    </div>
  </div>

  <p class="tagline">Built Slow. Built Real.</p>

  <style>
    .welcome .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .welcome .letter.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>

  <script>
    const el = document.getElementById('welcome-text');
    const text = el.innerText;
    const delay = 70; // ms per letter

    el.innerHTML = text.split('').map((ch) =>
      `<span class="letter">${ch === ' ' ? '&nbsp;' : ch}</span>`
    ).join('');

    const letters = el.querySelectorAll('.letter');

    function animateIn() {
      letters.forEach((l, i) =>
        setTimeout(() => l.classList.add('visible'), i * delay)
      );
    }

    function animateOut() {
      [...letters].reverse().forEach((l, i) =>
        setTimeout(() => l.classList.remove('visible'), i * delay)
      );
    }

    function cycle() {
      animateIn();
      const inDone = letters.length * delay + 1200;
      setTimeout(() => {
        animateOut();
        const outDone = letters.length * delay + 600;
        setTimeout(cycle, outDone);
      }, inDone);
    }

    cycle();
  </script>
</body>
</html>
